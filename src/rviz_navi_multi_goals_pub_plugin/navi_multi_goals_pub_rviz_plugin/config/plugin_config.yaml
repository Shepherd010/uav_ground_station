# ============================================================================
# navi_multi_goals_pub_rviz_plugin 配置文件
# 多点导航 RViz 面板可视化与行为参数
# ============================================================================

# 话题配置
goal_topic: "move_base_simple/goal"           # 订阅 RViz 2D Nav Goal 工具
goal_pub_topic: "move_base_simple/goal"       # 发布顺序导航目标
status_topic: "move_base/status"              # 订阅 move_base 状态
cancel_topic: "move_base/cancel"              # 发布取消指令
marker_topic: "visualization_marker"          # 发布可视化标记

# waypoint_manager 集成
waypoint_input_topic: "uav/waypoints/input"   # 发布航点到 waypoint_manager
save_service: "uav/waypoint_manager/save_waypoints"
load_service: "uav/waypoint_manager/load_waypoints"

# Marker 命名空间（独立命名空间，DELETEALL 不干扰其他插件）
marker_ns_arrow: "multi_navi_arrow"
marker_ns_number: "multi_navi_number"

# Marker 可视化参数
arrow_scale_x: 1.0
arrow_scale_y: 0.2
arrow_scale_z: 0.2
number_scale_z: 1.0
number_offset_z: 1.0
marker_color_r: 1.0
marker_color_g: 0.98
marker_color_b: 0.80
marker_color_a: 1.0
marker_lifetime_s: 0.0                        # 0 = 永久（由面板管理生命周期）

# 默认值
default_max_goals: 10
default_frame_id: "map"
spin_timer_ms: 100
